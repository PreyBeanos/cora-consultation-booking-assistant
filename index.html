<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CORA - Login</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-wrap {
        width: 100%;
        max-width: 380px;
        padding: 24px;
      }
      .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 24px;
      }
      .login-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .login-sub {
        font-size: 13px;
        color: var(--textMd);
        margin-bottom: 22px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 40px;
      }
      .pw-toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--textSm);
        font-size: 13px;
      }
      .login-btn {
        width: 100%;
        padding: 9px;
        font-size: 14px;
        font-weight: 600;
        margin-top: 4px;
        background: var(--blue);
        color: #fff;
        border: 1px solid var(--blueDk);
        border-radius: var(--radius);
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .login-btn:hover {
        background: var(--blueDk);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0;
        color: var(--textSm);
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .accounts-panel {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
      }
      .panel-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--textSm);
        margin-bottom: 8px;
      }
      .group-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--textSm);
        margin: 10px 0 4px;
      }
      .acc-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        border-radius: var(--radius);
        cursor: pointer;
        border-bottom: 1px solid var(--border);
      }
      .acc-row:last-child {
        border-bottom: none;
      }
      .acc-row:hover {
        background: var(--blueBg);
      }
      .acc-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .acc-uname {
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
      }
      .acc-name {
        font-size: 11px;
        color: var(--textSm);
      }
      .acc-role {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 3px;
        border: 1px solid var(--border);
        color: var(--textMd);
        background: var(--surface);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .hint {
        font-size: 11px;
        color: var(--textSm);
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-title">
          Consultation and Online Request Assistant (CORA) for PSHS-CBZRC
        </div>
        <div class="login-sub">
          Sign in to access the consultation booking system.
        </div>

        <div class="error-banner" id="err"></div>

        <div class="form-group">
          <label class="input-label" for="uname">Username</label>
          <input
            type="text"
            id="uname"
            placeholder="e.g. nathanagillon"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label class="input-label" for="pw">Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="pw"
              placeholder="Password"
              autocomplete="current-password"
            />
            <button class="pw-toggle" id="pw-toggle" tabindex="-1">Show</button>
          </div>
        </div>

        <button class="login-btn" id="login-btn">Sign In</button>
      </div>
    </div>

    <script src="shared.js"></script>
    <script>
      const ALL = [
        ...TEACHERS.map((t) => ({ ...t, role: "teacher" })),
        ...STUDENTS.map((s) => ({ ...s, role: "student" })),
      ];

      function buildRows(list, id, roleLabel) {
        const el = document.getElementById(id);
        el.innerHTML = list
          .map(
            (u) => `<div class="acc-row" data-u="${u.username}">
                      <div class="acc-left">
                        <div class="avatar" style="width:26px;height:26px;background:${u.color}22;border:1px solid ${u.color}55;color:${u.color}">${u.initials}</div>
                        <div>
                          <div class="acc-uname">${u.username}</div>
                          <div class="acc-name">${u.name}${u.subject ? " &middot; " + u.subject : ""}</div>
                        </div>
                      </div>
                      <span class="acc-role">${roleLabel}</span>
                    </div>`,
          )
          .join("");
        el.querySelectorAll(".acc-row").forEach((r) =>
          r.addEventListener("click", () => {
            document.getElementById("uname").value = r.dataset.u;
            document.getElementById("pw").value = "123456";
            document.getElementById("err").classList.remove("show");
            document.getElementById("login-btn").focus();
          }),
        );
      }

      document.getElementById("pw-toggle").addEventListener("click", () => {
        const i = document.getElementById("pw");
        const btn = document.getElementById("pw-toggle");
        i.type = i.type === "password" ? "text" : "password";
        btn.textContent = i.type === "password" ? "Show" : "Hide";
      });

      function showErr(msg) {
        const e = document.getElementById("err");
        e.textContent = msg;
        e.classList.add("show");
      }

      function login() {
        const u = document.getElementById("uname").value.trim().toLowerCase();
        const p = document.getElementById("pw").value;
        if (!u) {
          showErr("Please enter your username.");
          return;
        }
        if (!p) {
          showErr("Please enter your password.");
          return;
        }
        const user = ALL.find((x) => x.username === u);
        if (!user) {
          showErr("Username not found.");
          return;
        }
        if (user.password !== p) {
          showErr("Incorrect password.");
          return;
        }
        sessionStorage.setItem("currentUserId", user.id);
        sessionStorage.setItem("currentUserRole", user.role);
        location.href =
          user.role === "teacher" ? "teacher.html" : "student.html";
      }

      document.getElementById("login-btn").addEventListener("click", login);
      ["uname", "pw"].forEach((id) =>
        document.getElementById(id).addEventListener("keydown", (e) => {
          if (e.key === "Enter") login();
        }),
      );
      document.getElementById("uname").focus();
    </script>
  </body>
</html>
